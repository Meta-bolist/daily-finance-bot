name: Daily Finance Alert

on:
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Send Finance Alert
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install fear-greed requests yfinance -q
          python3 - << 'PYEOF'
          import requests
          import os
          import fear_greed
          import yfinance as yf
          from datetime import datetime, timezone, timedelta

          token = os.environ['TELEGRAM_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']

          kst = datetime.now(timezone(timedelta(hours=9)))
          weekday_kr = ['월', '화', '수', '목', '금', '토', '일']
          date_str = kst.strftime('%Y/%m/%d') + '(' + weekday_kr[kst.weekday()] + ')'
          headers = {'User-Agent': 'Mozilla/5.0'}
          ERR = '불러오기 실패'

          try:
              weather_res = requests.get(
                  'https://api.open-meteo.com/v1/forecast'
                  '?latitude=37.6154&longitude=126.7224'
                  '&daily=weathercode&timezone=Asia/Seoul&forecast_days=1'
              ).json()
              wcode = weather_res['daily']['weathercode'][0]
              weather_map = {0: chr(0x2600)+chr(0xfe0f), 1: chr(0x1f324)+chr(0xfe0f), 2: chr(0x1f324)+chr(0xfe0f), 3: chr(0x2601)+chr(0xfe0f)}
              if wcode in weather_map:
                  w_emoji = weather_map[wcode]
              elif wcode in [51,53,55,61,63,65,80,81,82]:
                  w_emoji = chr(0x1f327)+chr(0xfe0f)
              elif wcode in [71,73,75,77,85,86]:
                  w_emoji = chr(0x1f328)+chr(0xfe0f)
              elif wcode in [95,96,99]:
                  w_emoji = chr(0x26c8)+chr(0xfe0f)
              else:
                  w_emoji = chr(0x1f32b)+chr(0xfe0f)
          except Exception:
              w_emoji = '?'

          try:
              data = fear_greed.get()
              score = round(data['score'], 1)
              rating = data['rating'].lower()
              rating_map = {
                  'extreme fear': (chr(0x1f631), '극단적공포'),
                  'fear':         (chr(0x1f630), '공포'),
                  'neutral':      (chr(0x1f610), '중립'),
                  'greed':        (chr(0x1f911), '탐욕'),
                  'extreme greed':(chr(0x1f92f), '극단적탐욕'),
              }
              fg_emoji, fg_label = rating_map.get(rating, ('?', rating))
              fg_line = '{} 공포탐욕 {} {}'.format(fg_emoji, score, fg_label)
          except Exception:
              fg_line = '? 공포탐욕 ' + ERR

          try:
              vix_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              vix = round(vix_res['chart']['result'][0]['meta']['regularMarketPrice'], 1)
              if vix < 15:
                  vix_emoji, vix_comment = chr(0x1f603), '극도의 안도'
              elif vix < 20:
                  vix_emoji, vix_comment = chr(0x1f642), '정상'
              elif vix < 30:
                  vix_emoji, vix_comment = chr(0x1f914), '경계 및 불안'
              elif vix < 40:
                  vix_emoji, vix_comment = chr(0x1f628), '공포 및 투매'
              else:
                  vix_emoji, vix_comment = chr(0x1f631), '극심한 패닉'
              vix_line = '{} VIX {} {}'.format(vix_emoji, vix, vix_comment)
          except Exception:
              vix_line = '? VIX ' + ERR

          try:
              fx_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/USDKRW=X'
                  '?interval=1d&range=3d',
                  headers=headers
              ).json()
              closes = fx_res['chart']['result'][0]['indicators']['quote'][0]['close']
              closes = [c for c in closes if c is not None]
              krw_today = round(closes[-1])
              krw_yesterday = round(closes[-2])
              fx_arrow = chr(0x1f4c8) if krw_today > krw_yesterday else chr(0x1f4c9)
              diff = krw_today - krw_yesterday
              diff_str = '+{}원'.format(diff) if diff > 0 else '{}원'.format(diff)
              fx_line = '{} 환율 {:,}원 ({})'.format(fx_arrow, krw_today, diff_str)
          except Exception:
              fx_line = '? 환율 ' + ERR

          try:
              t10_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/%5ETNX'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              t10 = round(t10_res['chart']['result'][0]['meta']['regularMarketPrice'], 2)
              if t10 < 3.5:
                  t10_signal, t10_comment = chr(0x1f7e1), '경기침체 우려'
              elif t10 < 5.0:
                  t10_signal, t10_comment = chr(0x1f7e2), '금리 안정'
              else:
                  t10_signal, t10_comment = chr(0x1f534), '금리 과열 주가 압력'
              t10_line = '{} 미국채10년 {}% {}'.format(t10_signal, t10, t10_comment)
          except Exception:
              t10_line = '? 미국채10년 ' + ERR

          try:
              dxy_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/DX-Y.NYB'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              dxy = round(dxy_res['chart']['result'][0]['meta']['regularMarketPrice'], 1)
              if dxy < 100:
                  dxy_signal, dxy_comment = chr(0x1f7e1), '달러약세 신흥국 자금유입'
              elif dxy <= 105:
                  dxy_signal, dxy_comment = chr(0x1f7e2), '달러 안정'
              else:
                  dxy_signal, dxy_comment = chr(0x1f7e1), '달러강세 신흥국 자금유출'
              dxy_line = '{} 달러인덱스 {} {}'.format(dxy_signal, dxy, dxy_comment)
          except Exception:
              dxy_line = '? 달러인덱스 ' + ERR

          try:
              wti_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/CL%3DF'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              wti = round(wti_res['chart']['result'][0]['meta']['regularMarketPrice'], 1)
              if wti < 80:
                  wti_signal, wti_comment = chr(0x1f7e1), '경기 둔화 신호'
              elif wti <= 90:
                  wti_signal, wti_comment = chr(0x1f7e2), '유가 안정'
              else:
                  wti_signal, wti_comment = chr(0x1f534), '인플레 자극 위험'
              wti_line = '{} WTI유가 {}$ {}'.format(wti_signal, wti, wti_comment)
          except Exception:
              wti_line = '? WTI유가 ' + ERR

          try:
              qqq = yf.Ticker('QQQ')
              per = round(qqq.info['trailingPE'], 1)
              avg_per = 28.0
              diff_per = round((per - avg_per) / avg_per * 100)
              diff_per_str = '+{}%'.format(diff_per) if diff_per > 0 else '{}%'.format(diff_per)
              if per >= 30:
                  per_signal, per_comment = chr(0x1f534), '고평가'
              elif per >= 20:
                  per_signal, per_comment = chr(0x1f7e2), '적정'
              else:
                  per_signal, per_comment = chr(0x1f7e1), '저평가'
              per_line = '{} 나스닥100 PER {}배 ({} {})'.format(per_signal, per, diff_per_str, per_comment)
          except Exception as e:
              print('QQQ error:', e)
              per_line = '? 나스닥100 PER ' + ERR

          try:
              schd = yf.Ticker('SCHD')
              div_yield = round(schd.info['dividendYield'], 2)
              if div_yield >= 4.0:
                  div_signal, div_comment = chr(0x1f7e2), '저평가'
              elif div_yield >= 2.5:
                  div_signal, div_comment = chr(0x1f7e1), '적정'
              else:
                  div_signal, div_comment = chr(0x1f534), '고평가'
              div_line = '{} 다우배당100 {}% ({})'.format(div_signal, div_yield, div_comment)
          except Exception as e:
              print('SCHD error:', e)
              div_line = '? 다우배당100 ' + ERR

          msg = '[{} 주요지표 {}]\n{}\n{}\n{}\n{}\n{}\n{}\n{}\n{}'.format(
              date_str, w_emoji,
              fx_line, fg_line, vix_line,
              t10_line, dxy_line, wti_line,
              per_line, div_line
          )

          requests.post(
              'https://api.telegram.org/bot{}/sendMessage'.format(token),
              json={'chat_id': chat_id, 'text': msg}
          )
          PYEOF
