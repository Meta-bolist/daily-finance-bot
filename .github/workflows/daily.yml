name: Daily Finance Alert

on:
  schedule:
    - cron: '0 3 * * 1-5'
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Send Finance Alert
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install fear-greed requests -q
          python3 - << 'PYEOF'
          import requests
          import os
          import fear_greed

          token = os.environ['TELEGRAM_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']

          data = fear_greed.get()
          score = round(data['score'], 1)
          rating = data['rating'].lower()

          rating_kr = {
              'extreme fear': 'Extreme Fear (극단적 공포)',
              'fear': 'Fear (공포)',
              'neutral': 'Neutral (중립)',
              'greed': 'Greed (탐욕)',
              'extreme greed': 'Extreme Greed (극단적 탐욕)'
          }.get(rating, rating)

          fx = requests.get('https://api.exchangerate-api.com/v4/latest/USD').json()
          krw = round(fx['rates']['KRW'])

          msg = "[오늘의 시장 지표]\n\n원/달러 환율: {:,}원\n공포탐욕지수: {} ({})".format(krw, score, rating_kr)

          requests.post(
              'https://api.telegram.org/bot{}/sendMessage'.format(token),
              json={'chat_id': chat_id, 'text': msg}
          )
          PYEOF
