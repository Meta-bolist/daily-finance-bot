name: Daily Finance Alert

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Send Finance Alert
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_TEST_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KRX_USER: ${{ secrets.KRX_ID }}
          KRX_PASS: ${{ secrets.KRX_PW }}
        run: |
          pip install fear-greed requests yfinance pykrx -q
          python3 - << 'PYEOF'
          import requests
          import os
          import json
          import fear_greed
          import yfinance as yf
          from pykrx import stock
          from datetime import datetime, timezone, timedelta

          token = os.environ['TG_TOKEN']
          chat_id = os.environ['TG_CHAT_ID']
          os.environ['KRX_ID'] = os.environ['KRX_USER']
          os.environ['KRX_PW'] = os.environ['KRX_PASS']

          kst = datetime.now(timezone(timedelta(hours=9)))
          weekday_kr = ['월', '화', '수', '목', '금', '토', '일']
          date_str = kst.strftime('%Y/%m/%d') + '(' + weekday_kr[kst.weekday()] + ')'
          today_str = kst.strftime('%Y%m%d')
          prev5_str = (kst - timedelta(days=5)).strftime('%Y%m%d')
          headers = {'User-Agent': 'Mozilla/5.0'}
          ERR = '불러오기 실패'

          data_file = 'data/prev.json'
          os.makedirs('data', exist_ok=True)
          try:
              with open(data_file, 'r') as f:
                  prev = json.load(f)
          except Exception:
              prev = {}
          today_data = {}

          def fmt_diff(val, prev_val, unit='', decimal=1):
              if prev_val is None:
                  return ''
              diff = round(val - prev_val, decimal)
              if diff > 0:
                  return ' [+{}{}]'.format(diff, unit)
              elif diff < 0:
                  return ' [{}{}]'.format(diff, unit)
              else:
                  return ' [0{}]'.format(unit)

          try:
              weather_res = requests.get(
                  'https://api.open-meteo.com/v1/forecast'
                  '?latitude=37.6154&longitude=126.7224'
                  '&daily=weathercode&timezone=Asia/Seoul&forecast_days=1'
              ).json()
              wcode = weather_res['daily']['weathercode'][0]
              weather_map = {0: chr(0x2600)+chr(0xfe0f), 1: chr(0x1f324)+chr(0xfe0f), 2: chr(0x1f324)+chr(0xfe0f), 3: chr(0x2601)+chr(0xfe0f)}
              if wcode in weather_map:
                  w_emoji = weather_map[wcode]
              elif wcode in [51,53,55,61,63,65,80,81,82]:
                  w_emoji = chr(0x1f327)+chr(0xfe0f)
              elif wcode in [71,73,75,77,85,86]:
                  w_emoji = chr(0x1f328)+chr(0xfe0f)
              elif wcode in [95,96,99]:
                  w_emoji = chr(0x26c8)+chr(0xfe0f)
              else:
                  w_emoji = chr(0x1f32b)+chr(0xfe0f)
          except Exception:
              w_emoji = '?'

          try:
              fx_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/USDKRW=X'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              closes = fx_res['chart']['result'][0]['indicators']['quote'][0]['close']
              closes = [c for c in closes if c is not None]
              krw_today = round(closes[-1])
              today_data['krw'] = krw_today
              krw_yesterday = prev.get('krw')
              if krw_yesterday:
                  diff = krw_today - krw_yesterday
                  diff_str = '+{}\u20a9'.format(diff) if diff > 0 else '{}\u20a9'.format(diff)
                  fx_arrow = chr(0x1f4c8) if diff > 0 else chr(0x1f4c9)
                  fx_line = '{} 환율: {:,}\u20a9 [{}]'.format(fx_arrow, krw_today, diff_str)
              else:
                  fx_line = '- 환율: {:,}\u20a9'.format(krw_today)
          except Exception as e:
              print('FX error:', e)
              fx_line = '? 환율: ' + ERR

          try:
              t10_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/%5ETNX'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              t10 = round(t10_res['chart']['result'][0]['meta']['regularMarketPrice'], 2)
              today_data['t10'] = t10
              diff_t10 = fmt_diff(t10, prev.get('t10'), '%', 2)
              if t10 < 3.5:
                  t10_signal, t10_comment = chr(0x1f7e1), '금리 하락 \u2192 경기침체 우려'
              elif t10 < 5.0:
                  t10_signal, t10_comment = chr(0x1f7e2), '금리 안정'
              else:
                  t10_signal, t10_comment = chr(0x1f534), '금리 과열 \u2192 주가 하락 압력'
              t10_line = '{} 미국채10년: {}%{} {}'.format(t10_signal, t10, diff_t10, t10_comment)
          except Exception:
              t10_line = '? 미국채10년: ' + ERR

          try:
              dxy_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/DX-Y.NYB'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              dxy = round(dxy_res['chart']['result'][0]['meta']['regularMarketPrice'], 1)
              today_data['dxy'] = dxy
              diff_dxy = fmt_diff(dxy, prev.get('dxy'), '', 1)
              if dxy < 100:
                  dxy_signal, dxy_comment = chr(0x1f7e1), '달러약세 \u2192 신흥국 자금유입'
              elif dxy <= 105:
                  dxy_signal, dxy_comment = chr(0x1f7e2), '달러 안정'
              else:
                  dxy_signal, dxy_comment = chr(0x1f7e1), '달러강세 \u2192 신흥국 자금유출'
              dxy_line = '{} 달러인덱스: {}{} {}'.format(dxy_signal, dxy, diff_dxy, dxy_comment)
          except Exception:
              dxy_line = '? 달러인덱스: ' + ERR

          try:
              wti_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/CL%3DF'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              wti = round(wti_res['chart']['result'][0]['meta']['regularMarketPrice'], 1)
              today_data['wti'] = wti
              diff_wti = fmt_diff(wti, prev.get('wti'), '$', 1)
              if wti < 80:
                  wti_signal, wti_comment = chr(0x1f7e1), '유가 저가 \u2192 경기 둔화 신호'
              elif wti <= 90:
                  wti_signal, wti_comment = chr(0x1f7e2), '유가 안정'
              else:
                  wti_signal, wti_comment = chr(0x1f534), '유가 고가 \u2192 인플레 자극 위험'
              wti_line = '{} WTI유가: {}${} {}'.format(wti_signal, wti, diff_wti, wti_comment)
          except Exception:
              wti_line = '? WTI유가: ' + ERR

          try:
              data = fear_greed.get()
              score = round(data['score'], 1)
              rating = data['rating'].lower()
              rating_map = {
                  'extreme fear': (chr(0x1f631), '극단적공포'),
                  'fear':         (chr(0x1f630), '공포'),
                  'neutral':      (chr(0x1f610), '중립'),
                  'greed':        (chr(0x1f911), '탐욕'),
                  'extreme greed':(chr(0x1f92f), '극단적탐욕'),
              }
              fg_emoji, fg_label = rating_map.get(rating, ('?', rating))
              today_data['fg'] = score
              diff_fg = fmt_diff(score, prev.get('fg'), '', 1)
              fg_line = '{} 공포탐욕: {}{} {}'.format(fg_emoji, score, diff_fg, fg_label)
          except Exception:
              fg_line = '? 공포탐욕: ' + ERR

          try:
              vix_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              vix = round(vix_res['chart']['result'][0]['meta']['regularMarketPrice'], 1)
              today_data['vix'] = vix
              diff_vix = fmt_diff(vix, prev.get('vix'), '', 1)
              if vix < 15:
                  vix_emoji, vix_comment = chr(0x1f603), '극도의 안도'
              elif vix < 20:
                  vix_emoji, vix_comment = chr(0x1f642), '정상'
              elif vix < 30:
                  vix_emoji, vix_comment = chr(0x1f914), '경계 및 불안'
              elif vix < 40:
                  vix_emoji, vix_comment = chr(0x1f628), '공포 및 투매'
              else:
                  vix_emoji, vix_comment = chr(0x1f631), '극심한 패닉'
              vix_line = '{} VIX: {}{} {}'.format(vix_emoji, vix, diff_vix, vix_comment)
          except Exception:
              vix_line = '? VIX: ' + ERR

          try:
              qqq = yf.Ticker('QQQ')
              per = round(qqq.info['trailingPE'], 1)
              today_data['per'] = per
              diff_per_prev = fmt_diff(per, prev.get('per'), '', 1)
              avg_per = 28.0
              diff_per = round((per - avg_per) / avg_per * 100)
              diff_per_str = '+{}%'.format(diff_per) if diff_per > 0 else '{}%'.format(diff_per)
              if per >= 30:
                  per_signal, per_comment = chr(0x1f534), '고평가'
              elif per >= 20:
                  per_signal, per_comment = chr(0x1f7e2), '적정'
              else:
                  per_signal, per_comment = chr(0x1f7e1), '저평가'
              per_line = '{} 나스닥100 PER: {}배{} {} {}'.format(per_signal, per, diff_per_prev, diff_per_str, per_comment)
          except Exception as e:
              print('QQQ error:', e)
              per_line = '? 나스닥100 PER: ' + ERR

          try:
              schd = yf.Ticker('SCHD')
              div_yield = round(schd.info['dividendYield'], 2)
              today_data['div'] = div_yield
              diff_div = fmt_diff(div_yield, prev.get('div'), '%', 2)
              if div_yield >= 4.0:
                  div_signal, div_comment = chr(0x1f7e2), '저평가'
              elif div_yield >= 2.5:
                  div_signal, div_comment = chr(0x1f7e1), '적정'
              else:
                  div_signal, div_comment = chr(0x1f534), '고평가'
              div_line = '{} 다우배당100: {}%{} {}'.format(div_signal, div_yield, diff_div, div_comment)
          except Exception as e:
              print('SCHD error:', e)
              div_line = '? 다우배당100: ' + ERR

          try:
              df_pbr = stock.get_index_fundamental(prev5_str, today_str, '1028')
              df_pbr = df_pbr[df_pbr['PBR'] > 0]
              pbr = round(float(df_pbr['PBR'].iloc[-1]), 2)
              today_data['kospi_pbr'] = pbr
              diff_pbr = fmt_diff(pbr, prev.get('kospi_pbr'), '', 2)
              avg_pbr = 1.0
              diff_pbr_pct = round((pbr - avg_pbr) / avg_pbr * 100)
              diff_pbr_pct_str = '+{}%'.format(diff_pbr_pct) if diff_pbr_pct > 0 else '{}%'.format(diff_pbr_pct)
              if pbr < 1.0:
                  pbr_signal, pbr_comment = chr(0x1f7e2), '저평가'
              elif pbr <= 1.3:
                  pbr_signal, pbr_comment = chr(0x1f7e1), '적정'
              else:
                  pbr_signal, pbr_comment = chr(0x1f534), '고평가'
              pbr_line = '{} KOSPI PBR: {}배{} {} {}'.format(pbr_signal, pbr, diff_pbr, diff_pbr_pct_str, pbr_comment)
          except Exception as e:
              print('KOSPI PBR error:', e)
              pbr_line = '? KOSPI PBR: ' + ERR

          try:
              df_adr = stock.get_market_price_change(today_str, today_str, market='KOSPI')
              if len(df_adr) == 0:
                  df_adr = stock.get_market_price_change(prev5_str, today_str, market='KOSPI')
              up = len(df_adr[df_adr['등락률'] > 0])
              down = len(df_adr[df_adr['등락률'] < 0])
              adr = round(up / down * 100, 1) if down > 0 else 0
              today_data['kospi_adr'] = adr
              diff_adr = fmt_diff(adr, prev.get('kospi_adr'), '', 1)
              if adr >= 130:
                  adr_signal, adr_comment = chr(0x1f534), '과열 \u2192 조정 가능'
              elif adr >= 70:
                  adr_signal, adr_comment = chr(0x1f7e2), '정상'
              else:
                  adr_signal, adr_comment = chr(0x1f7e1), '침체 \u2192 반등 가능'
              adr_line = '{} KOSPI ADR: {}{} {}'.format(adr_signal, adr, diff_adr, adr_comment)
          except Exception as e:
              print('KOSPI ADR error:', e)
              adr_line = '? KOSPI ADR: ' + ERR

          try:
              with open(data_file, 'w') as f:
                  json.dump(today_data, f)
          except Exception as e:
              print('save error:', e)

          msg = '[{} 주요지표 {}]\n\n[글로벌]\n{}\n{}\n{}\n{}\n\n[미국]\n{}\n{}\n{}\n{}\n\n[한국]\n{}\n{}'.format(
              date_str, w_emoji,
              fx_line, t10_line, dxy_line, wti_line,
              fg_line, vix_line, per_line, div_line,
              pbr_line, adr_line
          )

          requests.post(
              'https://api.telegram.org/bot{}/sendMessage'.format(token),
              json={'chat_id': chat_id, 'text': msg}
          )
          PYEOF

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/prev.json
          git diff --staged --quiet || git commit -m "update prev data"
          git push
