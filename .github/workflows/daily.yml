name: Daily Finance Alert

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Send Finance Alert
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KRX_USER: ${{ secrets.KRX_ID }}
          KRX_PASS: ${{ secrets.KRX_PW }}
        run: |
          pip install fear-greed requests yfinance pykrx -q

          cat > /tmp/finance.py << 'PYEOF'
          # -*- coding: utf-8 -*-
          import requests
          import os
          import json
          import fear_greed
          import yfinance as yf
          from pykrx import stock
          from datetime import datetime, timezone, timedelta

          token = os.environ['TG_TOKEN']
          chat_id = os.environ['TG_CHAT_ID']
          os.environ['KRX_ID'] = os.environ['KRX_USER']
          os.environ['KRX_PW'] = os.environ['KRX_PASS']

          kst = datetime.now(timezone(timedelta(hours=9)))
          weekday_kr = ['월', '화', '수', '목', '금', '토', '일']
          date_str = kst.strftime('%Y/%m/%d') + '(' + weekday_kr[kst.weekday()] + ')'
          today_str = kst.strftime('%Y%m%d')
          prev5_str = (kst - timedelta(days=5)).strftime('%Y%m%d')
          prev30_str = (kst - timedelta(days=30)).strftime('%Y%m%d')
          headers = {'User-Agent': 'Mozilla/5.0'}
          ERR = '불러오기 실패'

          data_file = 'data/prev.json'
          os.makedirs('data', exist_ok=True)
          try:
              with open(data_file, 'r') as f:
                  prev = json.load(f)
          except Exception:
              prev = {}
          today_data = {}

          ICE  = '🧊'
          OK   = '✅'
          WARN = '⚠️'
          HOT  = '🚨'
          FIRE = '🔥'

          def fmt_diff(val, prev_val, unit='', decimal=1):
              if prev_val is None:
                  return ''
              diff = round(val - prev_val, decimal)
              if diff > 0:
                  return ' [+{}{}]'.format(diff, unit)
              elif diff < 0:
                  return ' [{}{}]'.format(diff, unit)
              else:
                  return ' [+0{}]'.format(unit)

          def direction_emoji(val, prev_val):
              if prev_val is None:
                  return '-'
              return '📈' if val >= prev_val else '📉'

          def grade(val, thresholds, emojis, comments):
              for i, t in enumerate(thresholds):
                  if val < t:
                      return emojis[i], comments[i]
              return emojis[-1], comments[-1]

          # 날씨
          try:
              weather_res = requests.get(
                  'https://api.open-meteo.com/v1/forecast'
                  '?latitude=37.6154&longitude=126.7224'
                  '&daily=weathercode&timezone=Asia/Seoul&forecast_days=1'
              ).json()
              wcode = weather_res['daily']['weathercode'][0]
              weather_map = {0: '☀️', 1: '🌤️', 2: '🌤️', 3: '☁️'}
              if wcode in weather_map:
                  w_emoji = weather_map[wcode]
              elif wcode in [51,53,55,61,63,65,80,81,82]:
                  w_emoji = '🌧️'
              elif wcode in [71,73,75,77,85,86]:
                  w_emoji = '🌨️'
              elif wcode in [95,96,99]:
                  w_emoji = '⛈️'
              else:
                  w_emoji = '🌫️'
          except Exception:
              w_emoji = '?'

          # 환율
          try:
              fx_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/USDKRW=X'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              closes = fx_res['chart']['result'][0]['indicators']['quote'][0]['close']
              closes = [c for c in closes if c is not None]
              krw_today = round(closes[-1])
              today_data['krw'] = krw_today
              krw_yesterday = prev.get('krw')
              if krw_yesterday:
                  diff = krw_today - int(krw_yesterday)
                  if diff > 0:
                      diff_str = '+{}₩'.format(diff)
                  elif diff < 0:
                      diff_str = '{}₩'.format(diff)
                  else:
                      diff_str = '+0₩'
                  fx_arrow = '📈' if diff >= 0 else '📉'
                  fx_line = '{} 환율: {:,}₩ [{}]'.format(fx_arrow, krw_today, diff_str)
              else:
                  fx_line = '- 환율: {:,}₩'.format(krw_today)
          except Exception as e:
              print('FX error:', e)
              fx_line = '? 환율: ' + ERR

          # 달러인덱스
          try:
              dxy_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/DX-Y.NYB'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              dxy = round(dxy_res['chart']['result'][0]['meta']['regularMarketPrice'], 1)
              today_data['dxy'] = dxy
              diff_dxy = fmt_diff(dxy, prev.get('dxy'), '', 1)
              dxy_arrow = direction_emoji(dxy, prev.get('dxy'))
              if dxy < 100:
                  dxy_comment = '달러약세'
              elif dxy <= 105:
                  dxy_comment = '달러안정'
              else:
                  dxy_comment = '달러강세'
              dxy_line = '{} 달러인덱스: {}{} {}'.format(dxy_arrow, dxy, diff_dxy, dxy_comment)
          except Exception as e:
              print('DXY error:', e)
              dxy_line = '? 달러인덱스: ' + ERR

          # WTI 유가
          try:
              wti_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/CL%3DF'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              wti = round(wti_res['chart']['result'][0]['meta']['regularMarketPrice'], 1)
              today_data['wti'] = wti
              diff_wti = fmt_diff(wti, prev.get('wti'), '$', 1)
              wti_arrow = direction_emoji(wti, prev.get('wti'))
              if wti < 80:
                  wti_comment = '유가 저가'
              elif wti <= 90:
                  wti_comment = '유가 안정'
              else:
                  wti_comment = '유가 고가'
              wti_line = '{} WTI유가: {}${} {}'.format(wti_arrow, wti, diff_wti, wti_comment)
          except Exception as e:
              print('WTI error:', e)
              wti_line = '? WTI유가: ' + ERR

          # 공포탐욕
          try:
              data = fear_greed.get()
              score = round(data['score'], 1)
              rating = data['rating'].lower()
              rating_map = {
                  'extreme fear': ('😱', '극단적공포'),
                  'fear':         ('😰', '공포'),
                  'neutral':      ('😐', '중립'),
                  'greed':        ('🤑', '탐욕'),
                  'extreme greed':('🤯', '극단적탐욕'),
              }
              fg_emoji, fg_label = rating_map.get(rating, ('?', rating))
              today_data['fg'] = score
              diff_fg = fmt_diff(score, prev.get('fg'), '', 1)
              fg_line = '{} 공포탐욕: {}{} {}'.format(fg_emoji, score, diff_fg, fg_label)
          except Exception as e:
              print('FG error:', e)
              fg_line = '? 공포탐욕: ' + ERR

          # VIX
          try:
              vix_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              vix = round(vix_res['chart']['result'][0]['meta']['regularMarketPrice'], 1)
              today_data['vix'] = vix
              diff_vix = fmt_diff(vix, prev.get('vix'), '', 1)
              if vix < 15:
                  vix_emoji, vix_comment = '😃', '극도의 안도'
              elif vix < 20:
                  vix_emoji, vix_comment = '🙂', '정상'
              elif vix < 30:
                  vix_emoji, vix_comment = '🤔', '경계 및 불안'
              elif vix < 40:
                  vix_emoji, vix_comment = '😨', '공포 및 투매'
              else:
                  vix_emoji, vix_comment = '😱', '극심한 패닉'
              vix_line = '{} VIX: {}{} {}'.format(vix_emoji, vix, diff_vix, vix_comment)
          except Exception as e:
              print('VIX error:', e)
              vix_line = '? VIX: ' + ERR

          # 미국채 10년물
          try:
              t10_res = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/%5ETNX'
                  '?interval=1d&range=2d',
                  headers=headers
              ).json()
              t10 = round(t10_res['chart']['result'][0]['meta']['regularMarketPrice'], 2)
              today_data['t10'] = t10
              diff_t10 = fmt_diff(t10, prev.get('t10'), '%', 2)
              t10_sig, t10_com = grade(
                  t10,
                  [3.0, 4.0, 4.5, 5.0],
                  [ICE, OK, WARN, HOT, FIRE],
                  ['저평가', '적정', '주의', '과열', '버블']
              )
              t10_line = '{} 미국채10년: {}%{} {}'.format(t10_sig, t10, diff_t10, t10_com)
          except Exception as e:
              print('T10 error:', e)
              t10_line = '? 미국채10년: ' + ERR

          # 나스닥100 PER
          try:
              qqq = yf.Ticker('QQQ')
              per = round(qqq.info['trailingPE'], 1)
              today_data['per'] = per
              diff_per_prev = fmt_diff(per, prev.get('per'), '', 1)
              avg_per = 28.0
              diff_per = round((per - avg_per) / avg_per * 100)
              diff_per_str = '+{}%'.format(diff_per) if diff_per > 0 else '{}%'.format(diff_per)
              per_sig, per_com = grade(
                  per,
                  [20, 28, 33, 38],
                  [ICE, OK, WARN, HOT, FIRE],
                  ['저평가', '적정', '주의', '과열', '버블']
              )
              per_line = '{} 나스닥100 PER: {}배{} {} {}'.format(per_sig, per, diff_per_prev, diff_per_str, per_com)
          except Exception as e:
              print('QQQ error:', e)
              per_line = '? 나스닥100 PER: ' + ERR

          # 다우배당100
          try:
              schd = yf.Ticker('SCHD')
              div_yield = round(schd.info['dividendYield'], 2)
              today_data['div'] = div_yield
              diff_div = fmt_diff(div_yield, prev.get('div'), '%', 2)
              div_sig, div_com = grade(
                  div_yield,
                  [2.5, 3.0, 3.5, 4.0],
                  [FIRE, HOT, WARN, OK, ICE],
                  ['버블', '과열', '주의', '적정', '저평가']
              )
              div_line = '{} 다우배당100: {}%{} {}'.format(div_sig, div_yield, diff_div, div_com)
          except Exception as e:
              print('SCHD error:', e)
              div_line = '? 다우배당100: ' + ERR

          # KOSPI PBR
          try:
              df_pbr = stock.get_index_fundamental(prev5_str, today_str, '1028')
              df_pbr = df_pbr[df_pbr['PBR'] > 0]
              pbr = round(float(df_pbr['PBR'].iloc[-1]), 2)
              today_data['kospi_pbr'] = pbr
              diff_pbr = fmt_diff(pbr, prev.get('kospi_pbr'), '', 2)
              avg_pbr = 1.0
              diff_pbr_pct = round((pbr - avg_pbr) / avg_pbr * 100)
              diff_pbr_pct_str = '+{}%'.format(diff_pbr_pct) if diff_pbr_pct > 0 else '{}%'.format(diff_pbr_pct)
              pbr_sig, pbr_com = grade(
                  pbr,
                  [1.5, 2.0, 2.4, 2.8],
                  [ICE, OK, WARN, HOT, FIRE],
                  ['저평가', '적정', '주의', '과열', '버블']
              )
              pbr_line = '{} KOSPI PBR: {}배{} {} {}'.format(pbr_sig, pbr, diff_pbr, diff_pbr_pct_str, pbr_com)
          except Exception as e:
              print('KOSPI PBR error:', e)
              pbr_line = '? KOSPI PBR: ' + ERR

          # KOSPI ADR 20일
          try:
              df_adr = stock.get_market_price_change(prev30_str, today_str, market='KOSPI')
              df_adr = df_adr[df_adr['등락률'] != 0]
              up = len(df_adr[df_adr['등락률'] > 0])
              down = len(df_adr[df_adr['등락률'] < 0])
              adr = round(up / down * 100, 1) if down > 0 else 0
              today_data['kospi_adr'] = adr
              diff_adr = fmt_diff(adr, prev.get('kospi_adr'), '', 1)
              adr_sig, adr_com = grade(
                  adr,
                  [75, 100, 125, 145],
                  [ICE, OK, WARN, HOT, FIRE],
                  ['저평가', '적정', '주의', '과열', '버블']
              )
              adr_line = '{} KOSPI ADR: {}{} {}'.format(adr_sig, adr, diff_adr, adr_com)
          except Exception as e:
              print('KOSPI ADR error:', e)
              adr_line = '? KOSPI ADR: ' + ERR

          try:
              with open(data_file, 'w') as f:
                  json.dump(today_data, f)
          except Exception as e:
              print('save error:', e)

          msg = '[{} 주요지표 {}]\n\n[글로벌]\n{}\n{}\n{}\n\n[미국]\n{}\n{}\n{}\n{}\n{}\n\n[한국]\n{}\n{}'.format(
              date_str, w_emoji,
              fx_line, dxy_line, wti_line,
              fg_line, vix_line, t10_line, per_line, div_line,
              pbr_line, adr_line
          )

          requests.post(
              'https://api.telegram.org/bot{}/sendMessage'.format(token),
              json={'chat_id': chat_id, 'text': msg}
          )
          PYEOF

          python3 /tmp/finance.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/prev.json
          git diff --staged --quiet || git commit -m "update prev data"
          git push
